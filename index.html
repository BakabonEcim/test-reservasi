<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Sistem Reservasi Restoran</title>
    <!-- Firebase SDK (gunakan compat untuk kemudahan) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- CSS akan diisi di part 2 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Navigasi utama -->
        <nav class="navbar">
            <button class="nav-btn" data-page="dashboard">Dashboard</button>
            <button class="nav-btn" data-page="reservasi-baru">Reservasi Baru</button>
            <button class="nav-btn" data-page="list-reservasi">List Reservasi</button>
            <button class="nav-btn" data-page="cek-meja">Cek Meja</button>
            <button class="nav-btn" data-page="atur-meja">Atur Meja</button>
        </nav>

        <!-- Konten halaman akan diisi secara dinamis -->
        <main id="content"></main>

        <!-- Modal umum (untuk konfirmasi, atur kolom, dll) -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Notifikasi sementara -->
        <div id="notification" class="notification hidden"></div>
    </div>

    <!-- JavaScript akan diisi di part 3 -->
    <script src="script.js"></script>
</body>
</html>
