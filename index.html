<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reservasi Restoran - Internal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Dashboard -->
        <div id="dashboard-page" class="page active">
            <h1>Dashboard Restoran</h1>
            <div class="date-info">Hari ini: <span id="current-date"></span></div>
            
            <!-- Card Info Dashboard -->
            <div class="dashboard-cards">
                <div class="info-card">
                    <div class="card-label">Reservasi Hari Ini</div>
                    <div class="card-value" id="dashboard-reservasi-count">0</div>
                </div>
                <div class="info-card">
                    <div class="card-label">Meja Available</div>
                    <div class="card-value" id="dashboard-meja-available">0</div>
                </div>
                <div class="info-card">
                    <div class="card-label">Belum Lengkap</div>
                    <div class="card-value" id="dashboard-belum-lengkap">0</div>
                </div>
            </div>

            <div class="menu-grid">
                <button class="menu-btn" data-action="buat">➕ Buat Reservasi Baru</button>
                <button class="menu-btn" data-action="tambah-meja">🪑 Tambah Meja</button>
                <button class="menu-btn" data-action="tambah-dp">💰 Tambah DP</button>
                <button class="menu-btn" data-action="list">📋 List Reservasi</button>
                <button class="menu-btn" data-action="cek">🔍 Cek Meja Kosong</button>
                <button class="menu-btn" data-action="atur-meja">⚙️ Atur Meja</button>
            </div>
        </div>

        <!-- Halaman Buat Reservasi (A) - 1 Halaman Langsung -->
        <div id="buat-page" class="page">
            <h2>➕ Buat Reservasi Baru</h2>
            <form id="form-reservasi-langsung">
                <div class="form-group">
                    <label>Tanggal Reservasi <span class="required">*</span></label>
                    <input type="date" id="buat-tanggal" class="date-picker" required>
                </div>
                
                <div class="form-group">
                    <label>Nama Tamu <span class="required">*</span></label>
                    <input type="text" id="nama" required>
                </div>
                
                <div class="form-group">
                    <label>Jumlah Tamu <span class="required">*</span></label>
                    <input type="number" id="jumlah" min="1" required>
                </div>
                
                <div class="form-group">
                    <label>Nomor HP <span class="required">*</span></label>
                    <input type="tel" id="hp" required>
                </div>
                
                <div class="form-group">
                    <label>Preferensi Area</label>
                    <select id="area">
                        <option value="Smoking">Smoking</option>
                        <option value="Non Smoking" selected>Non Smoking</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="punya-meja"> Sudah Ada Nomor Meja?
                    </label>
                </div>

                <div id="pilih-meja-container" style="display: none; margin-bottom: 15px;">
                    <label>Pilih Meja (bisa lebih dari satu):</label>
                    <div id="meja-grid-container" class="meja-pilih-grid"></div>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="punya-order"> Sudah Ada Orderan?
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="punya-dp"> Ada Pembayaran DP?
                    </label>
                </div>

                <div id="dp-container" style="display: none;">
                    <div class="form-group">
                        <label>Jenis Pembayaran</label>
                        <select id="jenis-pembayaran">
                            <option value="Transfer">Transfer</option>
                            <option value="Cash">Cash</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nominal DP</label>
                        <input type="number" id="nominal-dp" min="0">
                    </div>
                </div>

                <button type="button" class="btn" id="simpan-reservasi">Simpan Reservasi</button>
            </form>
            <button class="back-btn">← Kembali ke Dashboard</button>
        </div>

        <!-- Halaman Tambah Meja -->
        <div id="tambah-meja-page" class="page">
            <h2>🪑 Tambah Meja</h2>
            <div class="date-picker-container">
                <label>Pilih Tanggal: <input type="date" id="tambah-meja-tanggal" class="date-picker"></label>
                <button class="btn-load-tanggal">Muat</button>
            </div>
            <div id="daftar-reservasi-butuh-meja"></div>
            <div id="form-tambah-meja" style="display: none;"></div>
            <button class="back-btn">← Kembali ke Dashboard</button>
        </div>

        <!-- Halaman Tambah DP -->
        <div id="tambah-dp-page" class="page">
            <h2>💰 Tambah DP</h2>
            <div class="date-picker-container">
                <label>Pilih Tanggal: <input type="date" id="tambah-dp-tanggal" class="date-picker"></label>
                <button class="btn-load-tanggal">Muat</button>
            </div>
            <div id="daftar-reservasi-butuh-dp"></div>
            <div id="form-tambah-dp" style="display: none;"></div>
            <button class="back-btn">← Kembali ke Dashboard</button>
        </div>

        <!-- Halaman List Reservasi (C) -->
        <div id="list-page" class="page">
            <h2>📋 List Reservasi</h2>
            <div class="date-picker-container">
                <label>Pilih Tanggal: <input type="date" id="list-tanggal" class="date-picker"></label>
                <button class="btn-load-tanggal">Muat</button>
            </div>
            <div class="list-controls">
                <button id="toggle-view">📱 Tampilan Card</button>
                <button id="atur-kolom">⚙️ Atur Kolom</button>
                <select id="sort-by">
                    <option value="urutanDP">Urutan DP</option>
                    <option value="nomorMeja">Nomor Meja</option>
                    <option value="kelengkapan">Status Kelengkapan</option>
                </select>
            </div>
            <div id="list-container"></div>
            <button class="back-btn">← Kembali ke Dashboard</button>
        </div>

        <!-- Halaman Cek Meja Kosong (D) -->
        <div id="cek-page" class="page">
            <h2>🔍 Cek Meja Kosong</h2>
            <div class="date-picker-container">
                <label>Pilih Tanggal: <input type="date" id="cek-tanggal" class="date-picker"></label>
                <button class="btn-load-tanggal">Muat</button>
            </div>
            <div id="meja-kosong-container"></div>
            <button class="back-btn">← Kembali ke Dashboard</button>
        </div>

        <!-- Halaman Atur Meja -->
        <div id="atur-meja-page" class="page">
            <h2>⚙️ Atur Meja</h2>
            <button id="tambah-meja">➕ Tambah Meja Baru</button>
            <div id="daftar-meja"></div>
            <button class="back-btn">← Kembali ke Dashboard</button>
        </div>

        <!-- Modal untuk Atur Kolom -->
        <div id="modal-kolom" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Atur Kolom yang Ditampilkan</h3>
                <div id="kolom-list"></div>
                <button id="simpan-kolom">Simpan</button>
                <button id="tutup-modal">Tutup</button>
            </div>
        </div>

        <!-- Modal Detail Reservasi -->
        <div id="modal-detail" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Detail Reservasi</h3>
                <div id="detail-reservasi"></div>
                <button id="edit-detail">✏️ Edit Reservasi</button>
                <button id="tutup-detail">Tutup</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
