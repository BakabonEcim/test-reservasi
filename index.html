<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Sistem Reservasi Restoran</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login-container" class="container">
        <h2>Login Staff</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Masuk</button>
        </form>
    </div>

    <div id="app" style="display: none;">
        <nav id="navbar">
            <div class="nav-brand">Restoran Reservasi</div>
            <ul class="nav-links">
                <li><a href="#" data-page="dashboard">Dashboard</a></li>
                <li><a href="#" data-page="reservation-form">Buat Reservasi</a></li>
                <li><a href="#" data-page="reservation-list">List Reservasi</a></li>
                <li><a href="#" data-page="check-tables">Cek Meja</a></li>
                <li><a href="#" data-page="manage-tables">Atur Meja</a></li>
            </ul>
            <button id="logout-btn">Logout</button>
        </nav>

        <main id="content">
            <!-- Halaman akan di-render di sini -->
        </main>
    </div>

    <!-- Modal untuk detail, tambah meja, import CSV, konfirmasi -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Notifikasi -->
    <div id="notification" class="notification hidden"></div>

    <script src="script.js"></script>
</body>
</html>
